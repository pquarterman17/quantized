name: E2E (Playwright)

# GUI_INTERACTION_PLAN.md #15 — real-browser interaction coverage. A separate,
# independent workflow from CI (ci.yml): NOT wired into branch protection as a
# required check, so a flaky/slow browser run never blocks a merge. It exists
# so the suite gets exercised on every push/PR without being load-bearing.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync backend deps (webServer runs `uv run qz`)
        working-directory: .
        run: uv sync --group dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        run: npm install
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Build the SPA (what the backend serves)
        run: npm run build
      - name: Run the interaction-journey suite
        run: npm run e2e
        continue-on-error: false
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results
          retention-days: 7
