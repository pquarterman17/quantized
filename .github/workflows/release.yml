name: release

# Tag a version (v0.1.0 …) → on each OS build the SPA, the self-contained
# PyInstaller server sidecar and the native Tauri installer, smoke-test the
# sidecar, and attach the installer + a standalone server archive to the
# GitHub Release. The repo stays binary-free — artifacts live on the Release.
#
# Per-OS installer targets:
#   windows-latest → NSIS .exe  (upgrade-in-place + auto-update)
#   macos-latest   → .dmg       (unsigned; Gatekeeper right-click-open first run)
#   ubuntu-latest  → .deb       (.deb avoids AppImage's linuxdeploy, which can't
#                                resolve the sidecar's vendored numpy/scipy .so)

on:
  push:
    tags: ["v*"]
  # Manual dry run: builds + smoke-tests + uploads artifacts, but does NOT
  # create or attach to a GitHub Release (no tag context). Use this to validate
  # the pipeline without cutting a version.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  installers:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            bundles: nsis
            installer-glob: src-tauri/target/release/bundle/nsis/*.exe
            # Tauri v2 NSIS signs the installer .exe itself (no .nsis.zip); the
            # .exe is attached via installer-glob, so the updater only needs its
            # sibling .sig. Signed via the TAURI_SIGNING_* secrets.
            updater-glob: src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            server-archive: qz-server-win64.zip
          - os: macos-latest
            label: macos
            bundles: dmg
            installer-glob: src-tauri/target/release/bundle/dmg/*.dmg
            # auto-update is Windows-only for now (unsigned macOS would trip
            # Gatekeeper on relaunch); don't publish a darwin updater entry.
            updater-glob: ""
            server-archive: qz-server-macos.tar.gz
          - os: ubuntu-latest
            label: linux
            bundles: deb
            installer-glob: src-tauri/target/release/bundle/deb/*.deb
            # .deb is not an updater target — Linux stays manual install
            updater-glob: ""
            server-archive: qz-server-linux.tar.gz
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev libxdo-dev file

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build SPA (→ src/quantized/web)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build server sidecar (PyInstaller)
        run: |
          uv sync --group bundle
          uv run pyinstaller tools/bundle/qz-server.spec --noconfirm --distpath dist-sidecar

      - name: Smoke-test the sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist-sidecar/qz-server/qz-server.exe" `
                -ArgumentList "--no-browser" -PassThru
          $ok = $false
          foreach ($i in 1..40) {
            try {
              $h = Invoke-RestMethod http://127.0.0.1:8000/api/health -TimeoutSec 2
              if ($h.status -eq "ok") { $ok = $true; break }
            } catch { Start-Sleep -Milliseconds 1000 }
          }
          $spa = (Invoke-WebRequest http://127.0.0.1:8000/ -UseBasicParsing).StatusCode
          Stop-Process -Id $p.Id -Force
          if (-not $ok -or $spa -ne 200) { throw "sidecar smoke failed (health=$ok spa=$spa)" }
          Write-Host "sidecar healthy, SPA served"

      - name: Smoke-test the sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ./dist-sidecar/qz-server/qz-server --no-browser &
          pid=$!
          ok=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/api/health | grep -qE '"status": *"ok"'; then
              ok=1; break
            fi
            sleep 1
          done
          spa=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ || echo 000)
          kill "$pid" 2>/dev/null || true
          if [ "$ok" != "1" ] || [ "$spa" != "200" ]; then
            echo "sidecar smoke failed (health=$ok spa=$spa)"; exit 1
          fi
          echo "sidecar healthy, SPA served"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Write bundle-resource config override
        shell: bash
        run: |
          cat > src-tauri/ci.resources.json <<'JSON'
          { "bundle": { "resources": { "../dist-sidecar/qz-server": "qz-server" } } }
          JSON

      - name: Build Tauri installer (sidecar as bundled resource)
        working-directory: src-tauri
        env:
          # sign the updater artifacts so installed apps accept the update
          # (createUpdaterArtifacts is on in tauri.conf.json)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Pin the CLI to the resolved `tauri` crate version (keep in lockstep
        # with src-tauri/Cargo.lock) instead of floating @^2. The Windows NSIS
        # uninstall-key + shortcut naming scheme must stay byte-identical across
        # releases so each new installer recognizes and *replaces* the previous
        # version — a CLI that drifts between builds can change that scheme and
        # leave a duplicate in "Installed apps". The other upgrade-safety
        # invariants are stable in tauri.conf.json: productName "Quantized",
        # identifier app.quantized.desktop, nsis.installMode "currentUser" —
        # never change these or mix per-machine installs, or Windows treats the
        # result as a separate app.
        run: >
          npx --yes "@tauri-apps/cli@2.11.2" build
          --bundles ${{ matrix.bundles }}
          --config ci.resources.json

      - name: Archive standalone server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist-sidecar/qz-server -DestinationPath ${{ matrix.server-archive }}

      - name: Archive standalone server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: tar -C dist-sidecar -czf ${{ matrix.server-archive }} qz-server

      - name: Upload artifacts (workflow run — always)
        uses: actions/upload-artifact@v7
        with:
          name: qz-${{ matrix.label }}
          path: |
            ${{ matrix.installer-glob }}
            ${{ matrix.server-archive }}
          if-no-files-found: error

      - name: Attach artifacts to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.installer-glob }}
            ${{ matrix.updater-glob }}
            ${{ matrix.server-archive }}
          generate_release_notes: true

  # Build the updater manifest (latest.json) AFTER all installers have attached
  # their signed updater bundles + .sig files to the Release. The installed
  # app's endpoint (releases/latest/download/latest.json) reads this to discover
  # + verify the newest build. Tag releases only.
  updater-manifest:
    name: updater manifest
    needs: installers
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/$REPO/releases/download/$TAG"
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          # Tauri v2 NSIS: the updater artifact IS the installer .exe, signed
          # with a sibling .sig (no .nsis.zip). Auto-update is Windows-only.
          nsis=$(printf '%s\n' "$assets" | grep -E '\-setup\.exe$' | head -1 || true)
          if [ -z "$nsis" ]; then
            echo "::error::no -setup.exe found on $TAG"; exit 1
          fi
          gh release download "$TAG" --repo "$REPO" --pattern "${nsis}.sig" --dir sigs
          sig=$(cat "sigs/${nsis}.sig")
          jq -n --arg v "$version" --arg s "$sig" --arg u "$base/$nsis" \
            '{version:$v, pub_date:(now|todate),
              platforms:{"windows-x86_64":{signature:$s,url:$u}}}' > latest.json
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
