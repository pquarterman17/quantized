name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only checks out and tests — it never writes to the repo.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.11 = supported floor (requires-python), 3.13 = latest.
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - name: Sync deps
        run: uv sync --group dev
      # Lint + type-check once, on the latest interpreter (OS/version-independent).
      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        run: uv run ruff check src tests
      - name: Type check
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        run: uv run mypy src
      # Golden fixtures + frozen JSON are committed, so the suite runs without MATLAB.
      - name: Tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm install
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (includes typecheck)
        run: npm run build
