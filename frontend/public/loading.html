<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quantized</title>
    <style>
      /* Static splash shown by the Tauri shell while the local server boots.
         Loaded before the SPA, so it can't read the app's CSS tokens — the
         colours below mirror the dark theme (styles/colors.css). */
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: oklch(0.16 0.008 280);
        color: oklch(0.72 0.008 280);
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid oklch(0.29 0.009 280);
        border-top-color: oklch(0.7 0.17 295);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; color: oklch(0.92 0.005 280); }
      .sub { font-size: 12.5px; color: oklch(0.55 0.01 280); }
      #error {
        display: none;
        max-width: 30rem;
        padding: 0.75rem 1rem;
        text-align: center;
        color: oklch(0.78 0.14 12);
        background: oklch(0.2 0.04 12);
        border: 1px solid oklch(0.35 0.07 12);
        border-radius: 8px;
      }
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <div class="title">Starting Quantized…</div>
    <div class="sub" id="sub">Warming up the analysis engine</div>
    <div id="error"></div>
    <script>
      // The Tauri shell calls window.__qzError(msg) (via eval) if the server
      // never comes up, turning a blank "can't reach this page" into an
      // actionable message.
      window.__qzError = function (msg) {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("sub").style.display = "none";
        var e = document.getElementById("error");
        e.textContent = msg;
        e.style.display = "block";
      };
    </script>
  </body>
</html>
